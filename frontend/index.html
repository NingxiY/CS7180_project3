<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Dating Assistant</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>AI Multi-Agent Dating Assistant</h1>
      <p class="subtitle">
        Describe your situation and receive advice synthesized from multiple AI perspectives.
      </p>
    </header>

    <main>
      <form id="advice-form">
        <label for="context">Your situation</label>
        <textarea
          id="context"
          name="context"
          rows="6"
          placeholder="e.g. I've been talking to someone for two weeks. We have a lot in common but I'm not sure if they're interested romantically. My birthday is June 15, 1995..."
          required
        ></textarea>

        <button type="submit" id="submit-btn">Get Advice</button>
      </form>

      <section id="result" class="result" hidden>
        <h2>Advice</h2>
        <div id="result-content"></div>
      </section>
    </main>
  </div>

  <script src="main.js"></script>
</body>
</html>
